{
  "serviceId": "feishu-token-service",
  "registries": {
    "acr": {
      "host": "registry.cn-beijing.aliyuncs.com",
      "namespace": "mark-devlab2",
      "enabled": false
    },
    "ghcr": {
      "host": "ghcr.io",
      "namespace": "mark-devlab2",
      "enabled": true
    }
  },
  "test": {
    "run": "npm test"
  },
  "images": [
    {
      "name": "api",
      "image": "feishu-token-service-api",
      "context": ".",
      "dockerfile": "Dockerfile"
    },
    {
      "name": "admin-web",
      "image": "feishu-token-service-admin-web",
      "context": ".",
      "dockerfile": "apps/admin-web.Dockerfile"
    }
  ],
  "deploy": {
    "defaultTarget": "full",
    "productionRegistry": "ghcr"
  }
}
